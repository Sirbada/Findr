<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <!-- Primary gradient: emerald to lighter teal -->
    <linearGradient id="iconPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent gradient: warm coral accent -->
    <linearGradient id="iconAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8E53;stop-opacity:1" />
    </linearGradient>
    
    <!-- Background circle with subtle gradient -->
    <radialGradient id="iconBg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8FAFC;stop-opacity:1" />
    </radialGradient>
    
    <!-- Subtle shadow for app icon -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background circle for app icon -->
  <circle cx="40" cy="40" r="36" 
          fill="url(#iconBg)" 
          stroke="#E5E7EB" 
          stroke-width="0.5"
          filter="url(#iconShadow)"/>
  
  <!-- Logo Mark: Stylized V + Search concept (scaled up for icon) -->
  <g transform="translate(20, 20) scale(1.2)">
    <!-- Main V shape with search magnifier integration -->
    <path d="M 8 6 L 17 26 Q 18.5 28 20 26 L 29 6 Q 30 4 32 6 L 32 8 Q 32 10 30 11 L 21 31 Q 20 33 18.5 33 Q 17 33 16 31 L 7 11 Q 5 10 5 8 L 5 6 Q 5 4 7 4 Q 8.5 4 8 6 Z" 
          fill="url(#iconPrimary)"/>
    
    <!-- Search magnifier circle integrated into the V -->
    <circle cx="25" cy="12" r="5" 
            fill="none" 
            stroke="url(#iconAccent)" 
            stroke-width="2.5" 
            stroke-linecap="round"/>
    
    <!-- Magnifier handle -->
    <path d="M 28.5 16 L 32 19.5" 
          stroke="url(#iconAccent)" 
          stroke-width="2.5" 
          stroke-linecap="round"/>
    
    <!-- Find/location dots for context (minimal for small sizes) -->
    <circle cx="12" cy="20" r="1.5" fill="url(#iconAccent)" opacity="0.7"/>
    <circle cx="23" cy="23" r="1" fill="url(#iconAccent)" opacity="0.5"/>
  </g>
</svg>